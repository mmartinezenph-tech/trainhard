<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Train.Hard"/>
  <meta name="description" content="Muay Thai & HIIT Fight Timer by Martin Martinez"/>
  <title>Train.Hard</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="icon" href="icon-192.png"/>
  <style>
    html,body{margin:0;padding:0;background:#0a0a0a;overflow-x:hidden}
    #root{min-height:100vh}
    #splash{
      position:fixed;inset:0;background:#0a0a0a;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:9999;transition:opacity .5s ease
    }
    .s-sub{font-family:sans-serif;font-size:11px;letter-spacing:4px;color:#333;
      text-transform:uppercase;margin-bottom:6px}
    .s-title{font-family:sans-serif;font-size:36px;font-weight:900;
      color:#f0f0f0;letter-spacing:3px}
    .s-title span{color:#e8401a}
    .s-dot{width:8px;height:8px;border-radius:50%;background:#e8401a;margin-top:28px;
      animation:sp 1s ease-in-out infinite}
    @keyframes sp{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.3)}}
  </style>
</head>
<body>
  <div id="splash">
    <div class="s-sub">Fight Timer</div>
    <div class="s-title">TRAIN<span>.</span>HARD</div>
    <div class="s-dot"></div>
  </div>
  <div id="root"></div>

  <!-- React 18 from CDN — no Babel needed, pre-compiled app -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Pre-compiled app (no JSX, plain JS) -->
  <script src="app.js"></script>

  <script>
    function __removeSplash(){
      var s=document.getElementById('splash');
      if(s){s.style.opacity='0';setTimeout(function(){s.remove()},500)}
    }
    window.__removeSplash = __removeSplash;
    if('serviceWorker' in navigator){
      window.addEventListener('load',function(){
        navigator.serviceWorker.register('sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
