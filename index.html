// ─── SPEECH ENGINE ────────────────────────────────────────────────────────────
// Cus numbers: each digit spoken as individual utterance fired at exact 600ms intervals
// to perfectly sync with visual animation. NO cancel between numbers.
function createSpeech(lang) {
  let voice = null;
  const langCode = lang === "en" ? "en" : "es";
  const loadVoice = () => {
    const voices = window.speechSynthesis.getVoices();
    // Prefer deep/male voice for Mickey aggression
    const preferredEN = ["Google UK English Male", "Microsoft David", "Daniel", "Alex", "Fred"];
    const preferredES = ["Microsoft Pablo", "Google español", "Diego", "Jorge"];
    const preferred = lang === "en" ? preferredEN : preferredES;
    voice = voices.find(v => v.lang.startsWith(langCode) && preferred.some(m => v.name.includes(m))) || voices.find(v => v.lang.startsWith(langCode) && v.localService) || voices.find(v => v.lang.startsWith(langCode)) || voices[0];
  };
  loadVoice();
  window.speechSynthesis.onvoiceschanged = loadVoice;

  // Core speak — never cancels existing queue unless told to
  const speak = (text, rate = 1.0, pitch = 0.75, vol = 1, cancelFirst = true) => {
    try {
      loadVoice();
      if (cancelFirst) window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      if (voice) u.voice = voice;
      u.lang = lang === "en" ? "en-US" : "es-ES";
      u.rate = rate;
      u.pitch = pitch;
      u.volume = vol;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  };
  let cusTimers = [];
  return {
    // Mickey-style: aggressive, low pitch, fast delivery
    say: text => speak(text, 1.2, 0.72, 1, true),
    // Cus numbers: fire each digit as a SEPARATE utterance at timed intervals
    // matching exactly the 600ms visual step. Rate very fast (1.8) so each digit
    // finishes well within its 600ms slot. No cancel between them.
    sayNumbers: seq => {
      // Cancel any running Cus sequence
      cusTimers.forEach(clearTimeout);
      cusTimers = [];
      window.speechSynthesis.cancel();
      seq.forEach((n, i) => {
        const t = setTimeout(() => {
          try {
            loadVoice();
            const u = new SpeechSynthesisUtterance(String(n));
            if (voice) u.voice = voice;
            u.lang = lang === "en" ? "en-US" : "es-ES";
            u.rate = 1.8; // fast — digit finishes in ~150ms, well inside 600ms window
            u.pitch = 0.65; // deep and punchy like Cus shouting numbers
            u.volume = 1;
            window.speechSynthesis.speak(u);
          } catch (e) {}
        }, i * 600); // exact match to visual step
        cusTimers.push(t);
      });
    },
    // Mickey motivational quote — called directly from scheduleMickey with say()
    cancelCus: () => {
      cusTimers.forEach(clearTimeout);
      cusTimers = [];
    },
    cancel: () => {
      cusTimers.forEach(clearTimeout);
      cusTimers = [];
      try {
        window.speechSynthesis.cancel();
      } catch (e) {}
    }
  };
}

// ─── AUDIO ────────────────────────────────────────────────────────────────────
function createAudioEngine() {
  let ctx = null;
  const gc = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  };
  function beep(freq, dur, vol, type = "square", delay = 0) {
    const c = gc(),
      osc = c.createOscillator(),
      gain = c.createGain();
    osc.connect(gain);
    gain.connect(c.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, c.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, c.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
    osc.start(c.currentTime + delay);
    osc.stop(c.currentTime + delay + dur + 0.05);
  }
  return {
    bell: () => {
      beep(880, .5, .9, "sine");
      beep(1100, .3, .6, "sine", .12);
    },
    doubleBell: () => {
      beep(880, .4, .9, "sine");
      beep(880, .4, .7, "sine", .55);
    },
    // Minute change: 3 descending tones — clearly distinctive, not just a beep
